name: Bug Report
description: Report a bug in a @haptics/* package
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in everything you can — clear repro and version info are what get bugs fixed fast.

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      multiple: true
      options:
        - "@haptics/core"
        - "@haptics/react"
        - "@haptics/vue"
        - "@haptics/svelte"
        - "@haptics/vanilla"
        - react-haptics
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Output of `npm ls @haptics/<package>` or value from your package.json.
      placeholder: "1.0.1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Steps to reproduce, ideally with a link to a StackBlitz / CodeSandbox / minimal repo.
        For iOS issues, please confirm you're on **a real device** — the trick does not fire in Simulator.
      placeholder: |
        1. Wrap app with HapticsProvider
        2. Add `data-haptic="success"` to a button
        3. Tap on iOS Safari 17.5 (iPhone 15)
        4. Expected haptic tick; got nothing
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - iOS Safari (real device)
        - iOS Safari (Simulator — note: haptics never fire here)
        - Android Chrome
        - Android Samsung Internet
        - Android Firefox (vibration API removed in FF 129+)
        - Desktop (any browser)
        - Other
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device + OS
      placeholder: "iPhone 15, iOS 17.5.1 / Pixel 8, Android 14"
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser version
      placeholder: "Safari 17.5, Chrome 126.0.6478"
    validations:
      required: true

  - type: input
    id: framework-version
    attributes:
      label: Framework version
      description: React / Vue / Svelte / etc. version. Skip if using `@haptics/core` or `@haptics/vanilla`.
      placeholder: "react 19.0.0 / vue 3.5.0 / svelte 5.0.0"
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I verified system haptics are enabled (iOS only — Settings > Sounds & Haptics > System Haptics)
          required: false
        - label: I searched existing issues and didn't find a duplicate
          required: true
