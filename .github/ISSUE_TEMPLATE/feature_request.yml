name: Feature Request
description: Propose a new feature or API change
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a feature request, consider opening a **[Discussion](https://github.com/howdoiusekeyboard/haptics/discussions/categories/ideas)** first — they're better for exploring an idea before committing to a specific API.

  - type: dropdown
    id: package
    attributes:
      label: Target package
      multiple: true
      options:
        - "@haptics/core"
        - "@haptics/react"
        - "@haptics/vue"
        - "@haptics/svelte"
        - "@haptics/vanilla"
        - All adapters
        - New package
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the use case? What can't you do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: The shape of the API or behavior change you have in mind.
    validations:
      required: true

  - type: textarea
    id: api-sketch
    attributes:
      label: API sketch (optional)
      description: TypeScript signatures, sample usage, or a code block showing the feature in action.
      render: ts
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why this one is better.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and discussions and didn't find a duplicate
          required: true
        - label: This proposal does not require iOS-Safari capabilities beyond what the checkbox-switch trick supports (one tick per segment)
          required: false
